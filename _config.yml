# Site Settings
locale: "en-US"
title: "Chongjing Xia | Bioinformatician"
name: "Chongjing Xia"
description: "Personal academic website of Chongjing Xia — Bioinformatician at the University of Cambridge, specialising in fungal genomics, plant pathology, and computational biology."
url: "https://chongjing.github.io"
baseurl: ""
repository: "chongjing/chongjing.github.io"

# Site Author
author:
  name: "Chongjing Xia (夏崇靖)"
  avatar: "profile.png"
  bio: "Bioinformatician/Research Associate at the University of Cambridge. I develop and apply computational approaches to understand plant-pathogen interactions, fungal genomics, and crop disease resistance."
  location: "Cambridge, UK"
  employer: "University of Cambridge / Crop Science Centre"
  email: "cx264@cam.ac.uk"
  googlescholar: "https://scholar.google.com/citations?user=nU0lJq4AAAAJ&hl=en"
  orcid: "https://orcid.org/0000-0002-4865-7920"
  github: "chongjing"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:cx264@cam.ac.uk"
    - label: "Affiliation"
      icon: "fas fa-fw fa-building-columns"
      url: "https://www.cropsciencecentre.org/staff/chongjing-xia/"

# Site Build
markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-remote-theme

# Outputting
permalink: /:categories/:title/
paginate: 10
paginate_path: "/page:num/"
timezone: Europe/London

# Comments / Analytics (disabled for clean look)
comments: false
analytics:
  provider: false

# Defaults
defaults:
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      read_time: false
      share: false
      related: true
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/

# Category / Tag pages
category_archive:
  path: /categories/
tag_archive:
  path: /tags/

# Exclude
exclude:
  - .devcontainer
  - .github
  - Dockerfile
  - docker-compose.yaml
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CONTRIBUTING.md
  - vendor

# Include
include:
  - _pages

# Sass
sass:
  style: compressed

# Search
search: true

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/chongjing"
    - label: "Google Scholar"
      icon: "ai ai-google-scholar ai-fw"
      url: "https://scholar.google.com/citations?user=nU0lJq4AAAAJ&hl=en"

